[colors]
background = #ecddc6
background-alt = #d6dee1
foreground = #3f617a
primary = #abbba1
secondary = #6c8ca3
alert = #8d5b40
disabled = #aac6d2


[bar/mybar]
width = 100%
height = 25pt 
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 0
padding-right = 2 

font-0 = MesloLGLDZ Nerd Font:style=Bold:pixelsize=11;2
font-1 = MesloLGLDZ Nerd Font:style=Regular:pixelsize=13;3
font-2 = MesloLGLDZ Nerd Font:style=Regular:pixelsize=14;3
font-3 = MesloLGLDZ Nerd Font:style=Regular:pixelsize=16;3

modules-left = xworkspaces 
modules-center = date
modules-right =  tray pulseaudio powerbtn

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/tray]
type = internal/tray
tray-spacing = 10px
tray-size = 48%

[module/xworkspaces]
type = internal/xworkspaces
enable-click = false
enable-scroll = false
group-by-monitor = false

label-active = "ÔĄĎ"
label-active-foreground = ${colors.primary}
label-active-padding = 1

label-occupied = "ÔÜí"
label-occupied-padding = 1

label-urgent = %name%
label-urgent-padding = 1

label-empty = "ÔĄĆ" 
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title%

[module/pulseaudio]
type = internal/pulseaudio


format-volume = <label-volume>

label-volume-font = 3 
label-muted-font = 4 
label-volume = "ůįēĺ"

click-right = pavucontrol
label-muted = "ůįłą" 
label-muted-foreground = ${colors.disabled}
format-volume-margin = 10px
format-muted-margin = 10px


[module/alsa]
type = internal/alsa

master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default

master-mixer = Master
speaker-mixer = Speaker
headphone-mixer = Headphone

headphone-id = 9
mapped = true

format-volume = <ramp-volume>

ramp-volume-0 = "ůįēĺ"
label-muted = "ůįłą"
format-volume-font = 3 
label-muted-font = 3

[module/wireless-network]
type = internal/network
interval = 3.0
interface = wlp0s20f3 
interface-type = wireless
format-connected = %{A1:nm-connection-editor &:}<label-connected>%{A}
format-disconnected = %{A1:nm-connection-editor &:}<label-disconnected>%{A}
label-connected = "Ôáę" 
label-disconnected = "ůįĖ™"
label-disconnected-foreground = ${colors.disabled}
label-connected-font = 1 
label-disconnected-font = 1 
format-connected-margin = 20px 
format-disconnected-margin = 20px
format-connected-offset = -5px
 

[module/wired-network]
type = internal/network
interface = enp2s0
interface-type = wired
interval = 3.0
format-connected = %{A1:nm-connection-editor &:}<label-connected>%{A}
format-disconnected = %{A1:nm-connection-editor &:}<label-disconnected>%{A}
label-connected = "ůįěČ"
label-disconnected = "ůĪěź"
label-disconnected-foreground = ${colors.disabled}
label-connected-font = 3 
label-disconnected-font = 3 
format-connected-margin = 2 
format-disconnected-margin = 2 

[module/date]
type = internal/date
interval = 60 

date = %a %b %d, %H:%M

label = %date%

[module/powerbtn]
type = custom/text
click-left = ~/.local/bin/limos-powermenu 2> /dev/null
content-font = 2 
content = "‚ŹĽ"

[module/battery]
type = internal/battery
low-at = 15
battery = BAT0

format-charging = <animation-charging>
format-discharging = <ramp-capacity>

format-discharging-font = 3
format-discharging-margin = 20px 
format-charging-font = 3
format-charging-margin = 20px
format-charging-offset = -10px
format-discharging-offset = -10px

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ

animation-charging-framerate = 750

animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ

animation-discharging-framerate = 500


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
