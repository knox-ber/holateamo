
# --- Ventana y Apariencia ---
[window]
padding = { x = 12, y = 12 }
decorations = "None"
opacity = 0.95

# --- Fuente ---
[font]
size = 13.0

[font.normal]
family = "CaskaydiaCove Nerd Font"
style = "Regular"

[font.bold]
family = "CaskaydiaCove Nerd Font"
style = "Bold"

[font.italic]
family = "CaskaydiaCove Nerd Font"
style = "Italic"

# --- Cursor ---
[cursor]
style = { shape = "Underline", blinking = "On" }
unfocused_hollow = true

[general]
import = [
    "~/.config/alacritty/nord.toml"
]
